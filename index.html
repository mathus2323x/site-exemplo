<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Informatica</title>
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="./img/logoLoja.png" alt="">
            </div>
            <nav>
                <ul>
                    <li><a href="#">Quem somos</a></li>
                    <li><a href="#">Contato</a></li>
                    <li><a href="#">Produtos</a></li>
                    <li><a href="#">Trabalhe Conosco</a></li>
                </ul>
            </nav>
            <div class="login">
                <button>Entrar</button>
            </div>
        </div> <!--fim do container-->
    </header> <!--fim do cabeçalho-->

    <main>
        <div class="container">
            <div class="main-text">
                <h1>Somos a maior loja de informática do brasil, <span>Com os preços
                        dentro do mercado.</span></h1>
                <p>Os melhores perifericos da América latina</p>
                <div class="btn-main">
                    <button class="btnvermelho">Comprar Agora</button>
                    <button class="btnazul">veja o nosso Catalogo</button>
                </div>
            </div> <!--fim do main-text-->

            <div class="main-banner">
                <img src="img/server.png" alt="">
            </div>

        </div><!--fim do container-->
    </main><!--fim do main-->
</body>

</html>
